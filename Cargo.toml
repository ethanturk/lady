[workspace]
resolver = "2"
members = [
    "crates/lady-proto",
    "crates/lady-git",
    "crates/lady-cli",
    "crates/lady-graph",
    "crates/lady-diff",
    "src-tauri",
]

[workspace.package]
edition = "2021"
license = "LicenseRef-Proprietary"
publish = false

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
gix = { version = "0.84", default-features = false, features = [
    "max-performance-safe",
    "revision",
    "sha1",
    "blame",
    "status",
] }
tempfile = "3"
directories = "5"
toml = "0.8"
lady-proto = { path = "crates/lady-proto" }
lady-git = { path = "crates/lady-git" }
lady-graph = { path = "crates/lady-graph" }
lady-diff = { path = "crates/lady-diff" }
base64 = "0.22"
