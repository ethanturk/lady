# cargo-deny configuration — Lady (ADR-0004: permissive-only license gate).
#
# Lady is a commercial, closed-source product. We allow ONLY permissive
# licenses for our dependency tree. No GPL/AGPL/LGPL copyleft crates.
#
# Schema version 2 (cargo-deny >= 0.14).

[graph]
all-features = true

# ---------------------------------------------------------------------------
# Licenses — permissive allow-list per ADR-0004.
# ---------------------------------------------------------------------------
[licenses]
version = 2
# Permissive licenses only. Adding anything here is an ADR-level decision.
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "MPL-2.0",
    "ISC",
    "Unicode-3.0",
    # zlib-rs (pure-Rust zlib backend pulled by gix `max-performance-safe`).
    # The zlib license is OSI-approved and permissive (no copyleft). ADR-0004.
    "Zlib",
    # target-lexicon (Tauri transitive dep): Apache-2.0 + LLVM exception.
    # The LLVM exception is a permissive carve-out for LLVM-compiled code.
    # This does NOT weaken our commercial/closed-source posture. ADR-0004.
    "Apache-2.0 WITH LLVM-exception",
    # webpki-roots (rustls trust anchors = Mozilla CA bundle, via reqwest/rustls
    # in lady-hosting). CDLA-Permissive-2.0 is a permissive data license with no
    # copyleft on our code. ADR-0004 / ADR-0006 (hosting over rustls).
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

# Skip license checks on our own workspace crates (publish = false). They are
# LicenseRef-Proprietary and never shipped to crates.io.
private = { ignore = true }

# Explicit per-crate exceptions (ADR-0004).
#
# libgit2 / git2 are licensed GPL-2.0 WITH a linking exception ("GPL-2.0 WITH
# GCC-exception-2.0"-style), which permits use in closed-source software. We
# do NOT use git2 for reads (gix is the read engine per ADR-0003), but git2
# may appear for narrow write paths. This exception is allowed ONLY for the
# git2/libgit2-sys crates and nothing else. See ADR-0004.
exceptions = [
    { name = "git2", allow = ["GPL-2.0 WITH GCC-exception-2.0"] },
    { name = "libgit2-sys", allow = ["GPL-2.0 WITH GCC-exception-2.0"] },
]

# ---------------------------------------------------------------------------
# Advisories — RustSec security + maintenance gate.
# ---------------------------------------------------------------------------
[advisories]
version = 2
# Use the default RustSec advisory DB. Vulnerabilities + unmaintained crates
# fail the build by default; add ignores here only with a tracking note.
ignore = [
    # --- Tauri v2 transitive deps: gtk-rs GTK3 bindings (Linux WebKit path) ---
    # These are pulled in by wry/tao on Linux. We develop on macOS and these
    # crates are not reachable at runtime on macOS/Windows. Tracked: if Tauri
    # ships a GTK4 path these can be removed.
    "RUSTSEC-2024-0411", # gdk
    "RUSTSEC-2024-0412", # gdk-sys
    "RUSTSEC-2024-0413", # glib
    "RUSTSEC-2024-0414", # glib-sys
    "RUSTSEC-2024-0415", # gobject-sys
    "RUSTSEC-2024-0416", # gio
    "RUSTSEC-2024-0417", # gtk
    "RUSTSEC-2024-0418", # gtk-sys
    "RUSTSEC-2024-0419", # atk
    "RUSTSEC-2024-0420", # atk-sys
    # --- proc-macro-error: pulled by Tauri macros ---
    "RUSTSEC-2024-0370",
    # --- unic-* crates: pulled by Tauri/wry URL handling ---
    "RUSTSEC-2025-0075", # unic-char-range
    "RUSTSEC-2025-0080", # unic-common
    "RUSTSEC-2025-0081", # unic-char-property
    "RUSTSEC-2025-0098", # unic-ucd-version
    "RUSTSEC-2025-0100", # unic-ucd-ident
    # --- paste: unmaintained, pulled transitively by rmcp (lady-mcp, PH5-011) ---
    # A compile-time-only proc-macro helper (token pasting); no runtime surface.
    # Tracked: drop when rmcp removes the dependency. RUSTSEC-2024-0436.
    "RUSTSEC-2024-0436", # paste
]

# ---------------------------------------------------------------------------
# Bans — duplicate / disallowed crate policy.
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "deny"
# Internal workspace crates are referenced by `{ path = ... }` with no version,
# which reads as a wildcard. These are first-party, not registry deps — allow them.
allow-wildcard-paths = true
allow = []
deny = []

# ---------------------------------------------------------------------------
# Sources — only allow crates from crates.io (no random git sources).
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
