name: Release

# Tag a version (e.g. `git tag v1.3.0 && git push --tags`) to build, sign, and
# publish installers + the signed updater manifest across macOS/Windows/Linux.
# A manual run (workflow_dispatch) is a DRY RUN by default: it builds and uploads
# artifacts as workflow artifacts but publishes no GitHub release.
#
# All signing/notarization/updater secrets come from repo CI secrets. On forks
# (no secrets) the build still succeeds and produces UNSIGNED artifacts — nothing
# is published. PR CI (ci.yml) is untouched and fast; this only runs on tags /
# manual dispatch.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build artifacts without publishing a release"
        type: boolean
        default: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Full green gate, once, before we spend time bundling installers ──────────
  gate:
    name: green gate (fmt/clippy/test/deny + npm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux WebKit deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install UI deps
        run: npm ci
        working-directory: ui
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test
      - run: npm run build
        working-directory: ui
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  # ── Cross-platform bundle + sign/notarize + publish ─────────────────────────
  release-preflight:
    name: release preflight
    needs: gate
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Refuse to publish into an existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "::error::Release $GITHUB_REF_NAME already exists. Delete it before re-publishing this tag, or bump the patch version and publish a new tag."
            exit 1
          fi

  release:
    name: bundle / ${{ matrix.os }} ${{ matrix.target }}
    needs: [gate, release-preflight]
    strategy:
      fail-fast: false
      matrix:
        include:
          # One universal2 binary (arm64 + x86_64) so a single download runs
          # natively on both Apple Silicon and Intel — no "Intel-based app" Rosetta
          # warning. `rust_targets` installs BOTH triples that lipo merges from;
          # `universal-apple-darwin` is a tauri/lipo pseudo-target, not a rustup one.
          - { os: macos-latest, target: universal-apple-darwin, rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin", args: "--target universal-apple-darwin" }
          - { os: ubuntu-latest, target: "", rust_targets: "", args: "" }
          - { os: windows-latest, target: "", rust_targets: "", args: "" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux WebKit deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install UI deps
        run: npm ci
        working-directory: ui

      # tauri-action bundles, signs/notarizes when the secrets below are present
      # (skips gracefully when they're empty on forks), generates the signed
      # updater manifest (latest.json) because bundle.createUpdaterArtifacts is
      # on, and — when tagName is set — creates the GitHub release + uploads.
      - name: Build + bundle (+ sign/publish)
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          # macOS signing + notarization
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows Authenticode (Azure Trusted Signing or a PFX-based signCommand)
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          # Updater manifest signing (private key — public key is committed)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # On a tag push, publish a release. On manual dispatch (dry run), leave
          # tagName empty so tauri-action builds without creating a release.
          tagName: ${{ (github.event_name == 'push' || github.event.inputs.dry_run == 'false') && github.ref_name || '' }}
          releaseName: "Lady ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md."
          releaseDraft: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      # Dry run / fork: keep the bundles as workflow artifacts (nothing published).
      - name: Upload artifacts (dry run / no publish)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'false'
        uses: actions/upload-artifact@v4
        with:
          name: lady-${{ matrix.os }}-${{ matrix.target }}
          # Bundles land under target/release/bundle (ubuntu/windows) or
          # target/<triple>/release/bundle (macOS cross-target).
          path: |
            target/release/bundle/**
            target/*/release/bundle/**
          if-no-files-found: ignore

  # ── Android: signed universal APK → Firebase App Distribution ───────────────
  # The native project is generated fresh each run (`tauri android init`) — it is
  # not committed (src-tauri/gen is gitignored). Degrades gracefully: with no
  # signing secrets it builds an UNSIGNED APK and skips distribution; with no
  # Firebase secrets it builds the APK and uploads it only as a workflow
  # artifact. Runs in parallel with the desktop legs.
  #
  # Required repository secrets (all four for signing; both for distribution):
  #   ANDROID_KEYSTORE_BASE64    - base64 of the release keystore (.jks/.keystore)
  #   ANDROID_KEYSTORE_PASSWORD  - keystore (store) password
  #   ANDROID_KEY_ALIAS          - signing key alias
  #   ANDROID_KEY_PASSWORD       - signing key password
  #   FIREBASE_ANDROID_APP_ID    - Firebase Android app id (1:123:android:abcd)
  #   FIREBASE_SERVICE_ACCOUNT   - Firebase service-account JSON (App Distribution Admin)
  # Optional variable:
  #   FIREBASE_TESTER_GROUPS     - comma-separated tester groups (default: testers)
  android:
    name: android (apk + firebase)
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ANDROID_NDK_VERSION: 28.2.13676358
    steps:
      - uses: actions/checkout@v4

      # tauri.conf.json holds the version literally; sync it to the tag so the
      # APK's versionName/versionCode match the release (no-op on dry runs).
      - name: Sync version from tag
        if: github.ref_type == 'tag'
        run: |
          set -euo pipefail
          V="${GITHUB_REF_NAME#v}"
          tmp="$(mktemp)"
          jq --arg v "$V" '.version = $v' src-tauri/tauri.conf.json > "$tmp"
          mv "$tmp" src-tauri/tauri.conf.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages (platform, build-tools, NDK)
        run: |
          set -euo pipefail
          sdkmanager "platform-tools" "platforms;android-34" "platforms;android-36" \
            "build-tools;35.0.0" "ndk;${ANDROID_NDK_VERSION}"
          NDK_PATH="$ANDROID_HOME/ndk/${ANDROID_NDK_VERSION}"
          find "$ANDROID_HOME/ndk" -mindepth 1 -maxdepth 1 -type d \
            ! -path "$NDK_PATH" -exec rm -rf {} +
          echo "NDK_HOME=$NDK_PATH" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$NDK_PATH" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install tauri-cli + cargo-ndk
        run: cargo install tauri-cli --version "^2" cargo-ndk --locked

      - name: Install UI deps
        run: npm ci
        working-directory: ui

      - name: Validate Android signing / distribution secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          count_present() {
            present=0
            for name in "$@"; do
              [ -n "${!name:-}" ] && present=$((present + 1))
            done
            echo "$present"
          }
          signing="$(count_present ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD)"
          firebase="$(count_present FIREBASE_ANDROID_APP_ID FIREBASE_SERVICE_ACCOUNT)"
          if [ "$signing" -eq 4 ]; then
            echo "ANDROID_SIGNING_CONFIGURED=true" >> "$GITHUB_ENV"
          elif [ "$signing" -eq 0 ]; then
            echo "ANDROID_SIGNING_CONFIGURED=false" >> "$GITHUB_ENV"
            echo "::notice::Android signing secrets absent; building an unsigned APK and skipping distribution."
          else
            echo "::error::Android signing secrets partially set. Provide all of ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD."
            exit 1
          fi
          if [ "$firebase" -eq 2 ]; then
            echo "ANDROID_FIREBASE_CONFIGURED=true" >> "$GITHUB_ENV"
          elif [ "$firebase" -eq 0 ]; then
            echo "ANDROID_FIREBASE_CONFIGURED=false" >> "$GITHUB_ENV"
            echo "::notice::Firebase secrets absent; APK uploaded only as a workflow artifact."
          else
            echo "::error::Firebase secrets partially set. Provide both FIREBASE_ANDROID_APP_ID and FIREBASE_SERVICE_ACCOUNT."
            exit 1
          fi

      - name: Initialize Android project
        run: cargo tauri android init

      # Inject the release signing config into the freshly-generated Gradle
      # project (Tauri's template ships only a debug-signed release build). This
      # follows the official "Sign Android" guide; it errors loudly if the
      # template shape changes so a silent unsigned release can't slip through.
      - name: Configure release signing
        if: env.ANDROID_SIGNING_CONFIGURED == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          GEN="$GITHUB_WORKSPACE/src-tauri/gen/android"
          KEYSTORE="$GEN/release.jks"
          KEYSTORE_ERR="$RUNNER_TEMP/android-keystore.err"
          VALIDATION_DIR="$RUNNER_TEMP/android-signing-validation"
          VALIDATION_JAR="$RUNNER_TEMP/android-signing-validation.jar"

          if ! printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > "$KEYSTORE"; then
            echo "::error::ANDROID_KEYSTORE_BASE64 is not valid base64. Recreate it from the binary keystore file, for example: base64 -w0 release.jks"
            exit 1
          fi
          if [ ! -s "$KEYSTORE" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 decoded to an empty keystore file."
            exit 1
          fi

          # Validate the store (keytool) and the key + key password (jarsigner on
          # a throwaway marker jar) before the build, so a bad secret fails here
          # with a clear message instead of deep in Gradle.
          if ! keytool -list -keystore "$KEYSTORE" -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_KEY_ALIAS" > /dev/null 2> "$KEYSTORE_ERR"; then
            echo "::error::Android release keystore validation failed. Check ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, and ANDROID_KEY_ALIAS."
            sed 's/^/keytool: /' "$KEYSTORE_ERR" >&2
            exit 1
          fi
          rm -rf "$VALIDATION_DIR" "$VALIDATION_JAR"
          mkdir -p "$VALIDATION_DIR"
          printf 'lady android signing validation\n' > "$VALIDATION_DIR/marker.txt"
          jar cf "$VALIDATION_JAR" -C "$VALIDATION_DIR" marker.txt
          if ! jarsigner -keystore "$KEYSTORE" -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -keypass "$ANDROID_KEY_PASSWORD" "$VALIDATION_JAR" "$ANDROID_KEY_ALIAS" > /dev/null 2> "$KEYSTORE_ERR"; then
            echo "::error::Android release key validation failed. Check ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, and ANDROID_KEY_PASSWORD."
            sed 's/^/jarsigner: /' "$KEYSTORE_ERR" >&2
            exit 1
          fi

          # storeFile absolute so gradle's file() resolves from any module.
          {
            printf 'storeFile=%s\n' "$KEYSTORE"
            printf 'storePassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
            printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS"
            printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD"
          } > "$GEN/keystore.properties"
          python3 - "$GEN/app/build.gradle.kts" <<'PY'
          import re, sys
          p = sys.argv[1]
          s = open(p).read()
          if "keystore.properties" in s:
              sys.exit(0)  # already wired (newer template) — nothing to do
          header = (
              'import java.io.FileInputStream\n'
              'import java.util.Properties\n\n'
              'val keystorePropertiesFile = rootProject.file("keystore.properties")\n'
              'val keystoreProperties = Properties()\n'
              'if (keystorePropertiesFile.exists()) {\n'
              '    keystoreProperties.load(FileInputStream(keystorePropertiesFile))\n'
              '}\n\n'
          )
          s = header + s
          signing = (
              '    signingConfigs {\n'
              '        create("release") {\n'
              '            keyAlias = keystoreProperties["keyAlias"] as String\n'
              '            keyPassword = keystoreProperties["keyPassword"] as String\n'
              '            storeFile = file(keystoreProperties["storeFile"] as String)\n'
              '            storePassword = keystoreProperties["storePassword"] as String\n'
              '        }\n'
              '    }\n'
          )
          m = re.search(r'\n(\s*)buildTypes\s*\{', s)
          if not m:
              sys.stderr.write("Gradle template changed: no buildTypes block found.\n")
              sys.exit(1)
          s = s[:m.start()] + '\n' + signing + s[m.start():]
          s2 = re.sub(
              r'(getByName\("release"\)\s*\{)',
              r'\1\n            signingConfig = signingConfigs.getByName("release")',
              s, count=1,
          )
          if s2 == s:
              sys.stderr.write("Gradle template changed: no release buildType to attach signingConfig.\n")
              sys.exit(1)
          open(p, "w").write(s2)
          PY

      - name: Build APK
        run: cargo tauri android build --apk --verbose

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lady-android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn

      - name: Upload to Firebase App Distribution
        if: >-
          env.ANDROID_SIGNING_CONFIGURED == 'true'
          && env.ANDROID_FIREBASE_CONFIGURED == 'true'
          && (github.event_name == 'push' || github.event.inputs.dry_run == 'false')
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: ${{ vars.FIREBASE_TESTER_GROUPS || 'testers' }}
          releaseNotes: "Lady ${{ github.ref_name }}"
          file: src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk

  # ── iOS builds run on Xcode Cloud, not here ─────────────────────────────────
  # The committed Xcode project (src-tauri/gen/apple) is built + signed by an
  # Xcode Cloud workflow that archives and ships to TestFlight via App Store
  # Connect. ci_scripts/ci_post_clone.sh installs Rust/Tauri/Node on the runner.

  # ── Linux Flatpak (best-effort, after the bundle leg) ───────────────────────
  flatpak:
    name: flatpak
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install build + flatpak deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.gnome.Platform//46 org.gnome.Sdk//46 || true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install UI deps
        run: npm ci
        working-directory: ui
      - name: Build binary
        run: cargo build --release -p lady-app
      - name: Stage Flatpak inputs
        run: |
          cp target/release/lady flatpak/lady
          cp src-tauri/icons/128x128.png flatpak/icon.png
      - name: flatpak-builder
        working-directory: flatpak
        run: |
          flatpak-builder --force-clean --repo=repo build-dir dev.lady.client.yml || \
            echo "::warning::flatpak-builder failed (runtime availability on CI varies); manifest is committed for local/release builds."
