name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    name: build / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Disable CRLF rewriting (Windows)
        if: matrix.os == 'windows-latest'
        run: git config --global core.autocrlf false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies (Tauri)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --all-targets

      - name: Test
        run: cargo test

  deny:
    name: cargo-deny (license + advisory gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  bench:
    name: benchmarks (compile + quick run, no perf gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      # Compile every bench so the harness can never silently rot.
      - name: Compile benches
        run: cargo bench --no-run -p lady-graph -p lady-diff -p lady-git

      # Run in quick mode. This verifies the benches execute end-to-end; it is
      # NOT a perf gate — shared CI runners are too noisy to assert budgets, so
      # measured numbers are recorded by hand in docs/PERF.md on a dev machine.
      - name: Run benches (quick, non-gating)
        run: cargo bench -p lady-graph -p lady-diff -p lady-git -- --quick --noplot
