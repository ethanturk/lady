[package]
name = "lady-app"
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish.workspace = true

[[bin]]
name = "lady"
path = "src/main.rs"

[lib]
name = "lady_app_lib"
crate-type = ["cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { workspace = true }
serde_json = { workspace = true }
lady-git = { workspace = true }
lady-proto = { workspace = true }
lady-graph = { workspace = true }
lady-diff = { workspace = true }
lady-hosting = { workspace = true }
directories = { workspace = true }
toml = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
